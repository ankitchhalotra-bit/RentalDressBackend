name: CI/CD - Spring Boot Docker Deploy to EC2

on:
  push:
    branches: [ "master" ]

jobs:

  build-and-deploy:

    runs-on: ubuntu-latest

    steps:
    #Checkout code from repo
    - name: Checkout code
      uses: actions/checkout@v4

    # Set up Java for Spring Boot build
    - name: Setup Java For Build
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    # Give permission to Maven wrapper
    - name: Grant execute permission for mvnw
      run: chmod +x mvnw

    - name: Build Springboot project
      run: ./mvnw clean package -DskipTests

    # Login to Docker Hub
    - name: Login to Docker
      uses: actions/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # Build Docker image    
    - name: Build docker Image
      run: docker build -t ${{ secrets.DOCKER_USERNAME }}/springboot-app:latest .

    # Push Docker image
    - name: Push image to docker
      run: docker push ${{ secrets.DOCKER_USERNAME }}/springboot-app:latest

    # Deploy to EC2  
    - name: Deploy to EC2 Server
      uses: actions/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script:
          docker stop springboot-app || true
          docker rm springboot-app ||  true
          docker rmi ${{ secrets.DOCKER_USERNAME }}/springboot-app:latest || true

          docker pull ${{ secrets.DOCKER_USERNAME }}/springboot-app:latest

          docker run -d --name springboot-app -p 8080:8080 ${{ secrets.DOCKER_USERNAME }}/springboot-app:latest

      
